version: 2.1

workflows:
  test-and-release:
    jobs:
      - jasmine:
          filters:
            tags:
              only: /.*/
      - checks:
          filters:
            tags:
              only: /.*/
      - jasmine-dev:
          filters:
            tags:
              only: /.*/
      - checks-dev:
          filters:
            tags:
              only: /.*/
      - coverage-final:
          requires: [jasmine, jasmine-dev]
          filters:
            tags:
              only: /.*/
      - build-and-release:
          requires: [jasmine, jasmine-dev, checks, checks-dev]
          filters:
            tags:
              only: /\d+\.\d+\.\d+/
            branches:
              ignore: /.*/
      - update-description:
          requires: [build-and-release]
          filters:
            tags:
              only: /\d+\.\d+\.\d+/
            branches:
              ignore: /.*/

jobs:
  jasmine:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd source; yarn install
      - run:
          name: Unit tests (Jasmine)
          command: cd source; npm run coverage
      - run:
          name: Upload coverage to Codacy (partial)
          command: cd source; bash <(curl -Ls https://coverage.codacy.com/get.sh) report --partial -r coverage/lcov.info
  checks:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd source; yarn install
      - run:
          name: Lint
          command: cd source; npm run lint
      - run:
          name: Duplication report (JSCPD)
          command: cd source; npm run report

  jasmine-dev:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd dev; yarn install
      - run:
          name: Unit tests (Jasmine + c8 coverage)
          command: cd dev; npm run coverage
      - run:
          name: Upload coverage to Codacy (partial)
          command: cd dev; bash <(curl -Ls https://coverage.codacy.com/get.sh) report --partial -r coverage/lcov.info

  checks-dev:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd dev; yarn install
      - run:
          name: Lint
          command: cd dev; npm run lint
      - run:
          name: Duplication report (JSCPD)
          command: cd dev; npm run report

  coverage-final:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - run:
          name: Finalize coverage on Codacy
          command: bash <(curl -Ls https://coverage.codacy.com/get.sh) final

  build-and-release:
    machine: true
    steps:
      - checkout
      - run:
          name: Build and release
          command: make release TAG=${CIRCLE_TAG:-latest}

  update-description:
    docker:
      - image: darthjee/scripts:0.6.0
    steps:
      - checkout
      - run:
          name: Update Docker Hub description
          command: make update-description

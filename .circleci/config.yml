version: 2.1

workflows:
  test-and-release:
    jobs:
      - jasmine:
          filters:
            tags:
              only: /.*/
      - checks:
          filters:
            tags:
              only: /.*/
      - jasmine-dev:
          filters:
            tags:
              only: /.*/
      - checks-dev:
          filters:
            tags:
              only: /.*/
      - coverage-final:
          requires: [jasmine, jasmine-dev]
          filters:
            tags:
              only: /.*/
      - build-and-release:
          requires: [jasmine, checks]
          filters:
            tags:
              only: /.*/
            branches:
              only:
                - main
      - update-description:
          requires: [build-and-release]
          filters:
            tags:
              only: /.*/
            branches:
              only:
                - main

jobs:
  jasmine:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd source; yarn install
      - run:
          name: Unit tests (Jasmine)
          command: cd source; npm run coverage
      - run:
          name: Upload coverage to Codacy (partial)
          command: cd source; bash <(curl -Ls https://coverage.codacy.com/get.sh) report --partial -r coverage/lcov.info
  checks:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd source; yarn install
      - run:
          name: Lint
          command: cd source; npm run lint
      - run:
          name: Duplication report (JSCPD)
          command: cd source; npm run report

  jasmine-dev:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd dev; yarn install
      - run:
          name: Unit tests (Jasmine + c8 coverage)
          command: cd dev; npm run coverage
      - run:
          name: Upload coverage to Codacy (partial)
          command: cd dev; bash <(curl -Ls https://coverage.codacy.com/get.sh) report --partial -r coverage/lcov.info

  checks-dev:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd dev; yarn install
      - run:
          name: Lint
          command: cd dev; npm run lint
      - run:
          name: Duplication report (JSCPD)
          command: cd dev; npm run report

  coverage-final:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - run:
          name: Finalize coverage on Codacy
          command: bash <(curl -Ls https://coverage.codacy.com/get.sh) final

  build-and-release:
    machine: true
    steps:
      - checkout
      - run:
          name: Docker build
          command: |
            TAG=${CIRCLE_TAG:-latest}
            docker build --platform linux/amd64 \
              -f dockerfiles/production_navy/Dockerfile . \
              -t darthjee/navi:$TAG \
              -t darthjee/navi:latest
      - run:
          name: Docker login
          command: echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
      - run:
          name: Docker push (versioned tag)
          command: |
            TAG=${CIRCLE_TAG:-latest}
            docker push darthjee/navi:$TAG
      - run:
          name: Docker push (latest)
          command: docker push darthjee/navi:latest

  update-description:
    docker:
      - image: darthjee/scripts:0.6.0
    steps:
      - checkout
      - run:
          name: Docker push description
          command: /bin/sh /home/scripts/sbin/docker_hub.sh login_and_push_description darthjee/navi DOCKERHUB_DESCRIPTION.md

web:
  port: 8080
  enable_shutdown: false
workers:
  quantity: $WORKERS
  retry_cooldown: $RETRY_COOLDOWN
  max-retries: $MAX_RETRIES
clients:
  default:
    base_url: $BASE_URL
    timeout: $TIMOUT
resources:
  home:
    - url: /
      status: 200
      assets:
        - selector: script[src]
          attribute: src
        - selector: link[rel="stylesheet"]
          attribute: href
  categories:
    - url: /categories.json
      status: 200
      paginated_actions:
        - resource: paginated_categories
          pagination:
            - pages: headers['pages']
            - page_key: page
            - zero_indexed: false
    - url: /categories
      status: 302
    - url: /#/categories
      status: 200
  paginated_categories:
    - url: /categories.json?page={:page}
      status: 200
      actions:
        - resource: category
          parameters:
            id: parsedBody.id
        - resource: category_items
          parameters:
            id: parsedBody.id
    - url: /categories?page={:page}
      status: 302
    - url: /#/categories?page={:page}
      status: 200
  category:
    - url: /categories/{:id}.json
      status: 200
    - url: /categories/{:id}
      status: 302
    - url: /#/categories/{:id}
      status: 200
  category_items:
    - url: /categories/{:id}/items.json
      status: 200
      paginated_actions:
        - resource: paginated_category_items
          pagination:
            - pages: headers['pages']
            - page_key: page
            - zero_indexed: false
    - url: /categories/{:id}/items
      status: 302
    - url: /#/categories/{:id}/items
      status: 200
  paginated_category_items:
    - url: /categories/{:id}/items.json?page={:page}
      status: 200
      actions:
        - resource: category_item
          parameters:
            id: parsedBody.id
            category_id: parameters.id
    - url: /categories/{:id}/items?page={:page}
      status: 302
    - url: /#/categories/{:id}/items?page={:page}
      status: 200
  category_item:
    - url: /categories/{:category_id}/items/{:id}.json
      status: 200
    - url: /categories/{:category_id}/items/{:id}
      status: 302
    - url: /#/categories/{:category_id}/items/{:id}
      status: 200
